<!DOCTYPE html>
<html>
<head>
<script type="text/javascript" src="https://embeds.iubenda.com/widgets/07dae107-f343-46f4-ab75-4056b428897a.js"></script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FAR.E Group — Redirecting...</title>
<script>
  (function() {
    var lang = (navigator.language || navigator.userLanguage || 'en').toLowerCase();
    if (lang.startsWith('it')) {
      window.location.replace('/it/');
    } else {
      window.location.replace('/en/');
    }
  })();
</script>
<noscript>
  <meta http-equiv="refresh" content="0; url=/en/">
</noscript>
</head>
<body>
  <p>Redirecting... / Reindirizzamento in corso...</p>
  <p><a href="/it/">Italiano</a> | <a href="/en/">English</a></p>
</body>
</html>
